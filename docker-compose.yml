services:
  api:
    build: .
    ports:
      - "8000:80"
    volumes:
      # Para desarrollo: sincroniza el código local con el contenedor
      - ./app:/code/app
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env
    ports:
      # Opcional: Exponer el puerto de la BD al host para depuración
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-api:
    build:
      context: ../ml-memexp-service
    ports:
      - "8080:8000"
    volumes:
      - ../ml-memexp-service:/app
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
